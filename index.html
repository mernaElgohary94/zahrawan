<!doctype html>
<html lang="en">
  <head>
    <meta name="theme-color" content="#000000">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <title>AR Mirror</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #000;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* AR canvas — full portrait screen */
      #canvas {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        display: block;
        position: absolute;
        top: 0; left: 0;
        z-index: 0;
      }
      
      /* Hidden video for MediaPipe */
      #input-video {
        position: fixed;
        top: 0; left: 0;
        width: 1px; height: 1px;
        opacity: 0;
        pointer-events: none;
        z-index: -1;
      }

      /* Fingertip cursor dot */
      /* #hand-cursor {
        position: fixed;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: rgba(255, 252, 0, 0.85);
        border: 2px solid #fff;
        pointer-events: none;
        z-index: 99999;
        transform: translate(-50%, -50%);
        display: none;
        transition: background 0.15s;
        box-shadow: 0 0 10px rgba(255,252,0,0.6);
      } */

      /* Status text */
      #status {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        text-shadow: 0 2px 6px rgba(0,0,0,0.8);
        z-index: 10;
        min-height: 16px;
        text-align: center;
        pointer-events: none;
      }

      /* Victory sign "Hold..." indicator */
      #victory-indicator {
        display: none;
        position: fixed;
        top: 38%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 200px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 0 20px rgba(0,0,0,0.9);
        z-index: 9999;
        pointer-events: none;
        text-align: center;
        transition: opacity 0.1s;
      }

      /* Big countdown number */
      #thumbs-countdown {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 600px;
        font-weight: 900;
        color: #FFFC00;
        text-shadow:
          0 0 60px rgba(0,0,0,0.9),
          0 0 120px rgba(255,252,0,0.5);
        z-index: 9999;
        pointer-events: none;
        animation: pop 0.3s ease-out;
      }

      @keyframes pop {
        0%   { transform: translate(-50%, -50%) scale(1.5); opacity: 0.3; }
        100% { transform: translate(-50%, -50%) scale(1);   opacity: 1;   }
      }

      /* QR Panel — bottom left */
      #qr-panel {
        position: fixed;
        bottom: 40px;
        left: 30px;
        z-index: 10;
        display: none;
        flex-direction: column;
        align-items: center;
      }
      #qr-panel.visible { display: flex; }

      .qr-card {
        background: rgba(255,255,255,0.95);
        border-radius: 16px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        width: 680px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      }
      .qr-label {
        font-size: 55px;
        font-weight: 600;
        color: #111;
        text-align: center;
        line-height: 1.3;
      }
      #qr-canvas-wrapper {
        width:  580px;
        height: 580px;
        overflow: hidden;
        flex-shrink: 0;
      }
      #qr-canvas {
        display: block;
        width: 580px !important;
        height: 580px !important;
      }
      .qr-countdown {
        font-size: 40px;
        color: #888;
      }
      #victory-indicator,
      #thumbs-countdown,
      #hand-cursor,
      #qr-panel {
        will-change: transform, opacity;
        backface-visibility: hidden;
      }
    </style>
  </head>
  <body>
 
    <!-- AR output canvas -->
    <canvas id="canvas"></canvas>

    <!-- Hidden video for MediaPipe -->
    <video id="input-video" playsinline muted autoplay></video>

    <!-- Fingertip cursor dot -->
    <div id="hand-cursor"></div>

    <!-- Victory sign "Hold..." feedback -->
    <div id="victory-indicator">✌️ Hold...</div>
        <!-- Debug overlay — remove after fixing -->

    <!-- Big countdown number -->
    <div id="thumbs-countdown"></div>

    <!-- Status text -->
    <p id="status"></p>

    <!-- QR Panel — bottom left -->
    <div id="qr-panel">
      <div class="qr-card">
        <p class="qr-label">📲 Scan to download</p>
        <div id="qr-canvas-wrapper">
          <canvas id="qr-canvas"></canvas>
        </div>
        <p class="qr-countdown" id="countdown"></p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
